name: FF 30-Min Reminder

on:
  # 排程改由 cron-job.org 外部觸發(GitHub 原生 schedule 對高頻排程常有延遲問題)
  # 保留 workflow_dispatch,這樣 cron-job.org 才能透過 API 觸發這個 workflow
  workflow_dispatch:
    inputs:
      test_scenario:
        description: "測試情境(正式排程觸發時會自動忽略這個欄位,一律照真實資料發送)"
        type: choice
        options:
          - "off(正式發送真實資料)"
          - "一般情境(假資料)"
          - "Speech情境(假資料)"
        default: "off(正式發送真實資料)"

permissions:
  contents: write   # 需要寫入權限,才能把 sent_reminders.json commit 回 repo

jobs:
  send-reminder:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run reminder check (live)
        if: ${{ inputs.test_scenario == 'off(正式發送真實資料)' || inputs.test_scenario == '' }}
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python remind_before.py

      - name: Run reminder check (test - general)
        if: ${{ inputs.test_scenario == '一般情境(假資料)' }}
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python remind_before.py --send-test

      - name: Run reminder check (test - speech)
        if: ${{ inputs.test_scenario == 'Speech情境(假資料)' }}
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python remind_before.py --send-test-speech

      - name: Commit updated reminder state (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sent_reminders.json
          git diff --staged --quiet || git commit -m "update sent_reminders.json [skip ci]"
          git push
