name: FF 30-Min Reminder

on:
  schedule:
    - cron: "*/5 * * * *"   # 每 5 分鐘檢查一次
  workflow_dispatch:
    inputs:
      use_test_data:
        description: "使用假資料測試(不會真的抓 ForexFactory,只用來看訊息長怎樣)"
        type: boolean
        default: false

permissions:
  contents: write   # 需要寫入權限,才能把 sent_reminders.json commit 回 repo

jobs:
  send-reminder:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run reminder check
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          USE_TEST_DATA: ${{ inputs.use_test_data }}
        run: python remind_before.py

      - name: Commit updated reminder state (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sent_reminders.json
          git diff --staged --quiet || git commit -m "update sent_reminders.json [skip ci]"
          git push
