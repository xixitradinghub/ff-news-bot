name: FF Daily Digest

on:
  schedule:
    # UTC 00:00 = GMT+8 早上 08:00
    # 想改時間:改這裡的 UTC 時間就好(GMT+8 時間 - 8 小時 = UTC 時間)
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      use_test_data:
        description: "使用假資料測試(不會真的抓 ForexFactory,只用來看訊息長怎樣)"
        type: boolean
        default: false

jobs:
  send-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily digest
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          USE_TEST_DATA: ${{ inputs.use_test_data }}
        run: python daily_digest.py
