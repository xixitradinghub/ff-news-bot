name: FF Daily Digest

on:
  schedule:
    # UTC 00:00 = GMT+8 早上 08:00
    - cron: "0 0 * * *"
  workflow_dispatch: {}  # 允許在 GitHub 網頁上手動點擊執行,方便測試

jobs:
  send-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily digest
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python daily_digest.py
